<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pitch black background -->
  <rect width="64" height="64" fill="#050508"/>

  <!-- Sapphire border -->
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#2260C4" stroke-width="1.2"/>

  <!-- T: crossbar + stem -->
  <rect x="10" y="14" width="23" height="5" fill="#4A8FE7"/>
  <rect x="18.5" y="14" width="5" height="36" fill="#4A8FE7"/>

  <!-- H: left vertical (lighter, overlapping T stem slightly), crossbar, right vertical -->
  <rect x="22" y="14" width="5" height="36" fill="#2260C4"/>
  <rect x="22" y="30" width="21" height="5" fill="#3575D8"/>
  <rect x="38" y="14" width="5" height="36" fill="#2260C4"/>

  <!-- Subtle bottom accent line -->
  <line x1="10" y1="56" x2="54" y2="56" stroke="#1B4F9B" stroke-width="0.7" opacity="0.5"/>
</svg>
